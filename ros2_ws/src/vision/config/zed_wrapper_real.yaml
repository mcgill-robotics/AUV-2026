/**:
  ros__parameters:
    general:
      camera_model: 'zed2i'
      camera_name: 'real' # overwritten by launch file
      grab_resolution: 'VGA' # The native camera grab resolution. '4K', 'HD1200', 'HD1080', 'SVGA', 'AUTO'
      grab_frame_rate: 30 # ZED SDK internal grabbing rate (HD1200/HD1080: 60, 30, 15 - SVGA: 120, 60, 30, 15)
      pub_resolution: 'NATIVE'
      #pub_downscale_factor: 1.0
      pub_frame_rate: 30.0

    pos_tracking:
      pos_tracking_enabled: true
      pos_tracking_mode: 'GEN_1'
      publish_tf: false
      publish_map_tf: false
      area_memory: false
            
    sensors:
      sensors_image_sync: true
      publish_imu: false
      publish_imu_raw: false
      publish_temp: false
      publish_mag: false
      publish_baro: false
    gnss_fusion:
      gnss_fusion_enabled: false
    
    depth:
      openni_depth_mode: true # allow compressed depth image transport (e.g. compressed_depth) by using OpenNI format for depth images (16-bit unsigned int in millimeters instead of 32-bit float in meters)